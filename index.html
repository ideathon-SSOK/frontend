<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSOK</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="viewport">
<div class="app">

  <!-- ===== SCREEN: HOME ===== -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <div class="logo-img" aria-label="SSOK"></div>
    </div>
    <div class="home-body">
      <p class="home-welcome">어려운 글을 한 눈에 쉽게 쏙 !</p>

      <!-- 레벨 선택 -->
      <div class="home-level-section">
        <p class="home-level-label">나한테 맞는 설명 방식은?</p>
        <div class="level-chips">
          <button class="chip" data-level="중고등학생" data-desc="쉽고 친근하게" onclick="selectLevel(this)">중·고등학생</button>
          <button class="chip" data-level="대학생" data-desc="조금 더 깊게" onclick="selectLevel(this)">대학생</button>
          <button class="chip" data-level="취준생" data-desc="실용적으로" onclick="selectLevel(this)">취준생</button>
          <button class="chip" data-level="직장인" data-desc="간결하고 핵심만" onclick="selectLevel(this)">직장인</button>
        </div>
      </div>

      <button class="home-start-btn" onclick="goToInput()">
        글 읽으러 가기
        <span class="btn-arrow">→</span>
      </button>
    </div>
    <nav class="tab-bar">
      <button class="tab-item active" onclick="goTo('screen-home')">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span class="tab-label">홈</span>
      </button>
      <button class="tab-item" onclick="goToInput()">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <span class="tab-label">도우미</span>
      </button>
      <button class="tab-item" onclick="showComingSoon('학습')">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        <span class="tab-label">학습</span>
      </button>
      <button class="tab-item" onclick="showComingSoon('커뮤니티')">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <span class="tab-label">커뮤니티</span>
      </button>
      <button class="tab-item" onclick="showComingSoon('마이페이지')">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span class="tab-label">마이페이지</span>
      </button>
    </nav>
  </div>

  <!-- ===== SCREEN: INPUT ===== -->
  <div class="screen" id="screen-input">
    <div class="nav-bar">
      <button class="back-btn" onclick="goBack()">
        <svg width="10" height="17" viewBox="0 0 10 17" fill="none">
          <path d="M9 1L1 8.5L9 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <span class="nav-title">글 입력</span>
      <!-- 선택된 레벨 뱃지 -->
      <span class="nav-level-badge" id="nav-level-badge" style="display:none"></span>
    </div>

    <div class="input-screen-body">
      <!-- 제목 입력 -->
      <div class="title-input-wrap">
        <input
          type="text"
          id="input-title"
          class="title-input"
          placeholder="제목을 입력하세요"
        />
        <!-- <p class="title-sub">이해하기 어려운 글을 입력해보세요.</p> -->
      </div>

      <!-- 구분선 -->
      <div class="input-divider"></div>

      <!-- 이미지 업로드 버튼 -->
      <!-- <div class="image-action-row">
        <button class="image-action-btn" onclick="showComingSoon('이미지 업로드')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>이미지 업로드</span>
        </button>
        <button class="image-action-btn" onclick="showComingSoon('직접 촬영')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>
          </svg>
          <span>직접 촬영</span>
        </button>
      </div> -->

      <!-- 본문 textarea -->
      <div class="input-section grow">
        <textarea id="input" placeholder=" 이해하기 어려운 어떤 글이든 쏙! 넣어보세요"></textarea>
      </div>
    </div>

    <div class="bottom-action">
      <button class="primary-btn" id="btn-next" onclick="analyzeText()">다음</button>
    </div>
  </div>

  <!-- ===== SCREEN: READER ===== -->
  <div class="screen" id="screen-reader">
    <div class="nav-bar">
      <button class="back-btn" onclick="goBack()">
        <svg width="10" height="17" viewBox="0 0 10 17" fill="none">
          <path d="M9 1L1 8.5L9 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="reader-body" id="reader-body">
      <!-- <p class="reader-hint">막히는 곳에서 멈추지 마세요 — 누르거나 드래그하면 같이 읽어드릴게요</p> -->
      <h1 class="reader-title" id="reader-title"></h1>
      <div class="reader-text" id="reader-text"></div>
    </div>

    <div class="bottom-action">
      <button class="primary-btn" onclick="showFullAnalysis()">차근차근 읽어보기</button>
    </div>

    <!-- Full analysis panel -->
    <div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
    <div class="bottom-panel" id="analysis-panel">
      <div class="panel-handle"></div>
      <div class="panel-header">
        <!-- <span class="panel-title">전체 해석</span> -->
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <div class="panel-body" id="analysis-body"></div>
    </div>

    <!-- Word sheet -->
    <div class="panel-overlay" id="word-overlay" onclick="closeWordSheet()"></div>
    <div class="bottom-panel word-sheet" id="word-sheet">
      <div class="panel-handle"></div>
      <div class="panel-header">
       <button class="panel-close" onclick="closeWordSheet()">✕</button>
      </div>
      <div class="panel-body">
       <div id="sheet-meaning">
          <span class="loading-dots"><span></span><span></span><span></span></span>
        </div>
     </div>
    </div>
  </div>

  <!-- 모달 -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
  <div class="modal" id="modal">
    <p class="modal-msg" id="modal-msg"></p>
    <button class="modal-btn" onclick="closeModal()">확인</button>
  </div>

  <!-- 준비중 토스트 -->
  <div class="toast" id="toast"></div>

</div><!-- .app -->
</div><!-- .viewport -->

<script src="index.js"></script>
</body>
</html>
